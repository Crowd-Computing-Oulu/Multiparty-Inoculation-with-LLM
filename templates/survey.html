<!DOCTYPE html>
<html lang="en">
{% include 'includes/head.html' %}

<body class="d-flex flex-column min-vh-100">
  {% include 'includes/navbar.html' %}

  <div class="container mt-4" style="max-width: 95vw; width: 100%;">
    <div id="surveyContainer"></div>
  </div>

  {% include 'includes/footer.html' %}

  <!-- SurveyJS CDN -->
  <link href="https://unpkg.com/survey-core@2.5.17/survey-core.min.css" rel="stylesheet">
  <script src="https://unpkg.com/survey-core@2.5.17/survey.core.min.js"></script>
  <script src="https://unpkg.com/survey-js-ui@2.5.17/survey-js-ui.min.js"></script>
  <script src="https://unpkg.com/survey-core@2.5.17/themes/flat-light-panelless.min.js"></script>

  <!-- Survey definitions -->
  <script src="{{ url_for('static', filename='surveys/survey_definitions.js') }}"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const surveyName = "{{ survey_name }}";
      const submitUrl = "{{ submit_url }}";
      const nextUrl = "{{ next_url }}";

      const surveyJson = window[surveyName];
      if (!surveyJson) {
        document.getElementById("surveyContainer").innerHTML =
          '<div class="alert alert-danger">Survey definition not found.</div>';
        return;
      }

      const survey = new Survey.Model(surveyJson);
      survey.applyTheme(SurveyTheme.FlatLightPanelless);

      survey.onComplete.add(function(sender) {
        const data = sender.data;
        // Show a saving indicator
        document.getElementById("surveyContainer").innerHTML =
          '<div class="text-center mt-5"><p>Saving your responses...</p></div>';

        fetch(submitUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        })
        .then(function(response) {
          if (response.ok) {
            window.location.href = nextUrl;
          } else {
            document.getElementById("surveyContainer").innerHTML =
              '<div class="alert alert-danger">Error saving your responses. Please try again.</div>';
          }
        })
        .catch(function(err) {
          document.getElementById("surveyContainer").innerHTML =
            '<div class="alert alert-danger">Network error. Please try again.</div>';
        });
      });

      const container = document.getElementById("surveyContainer");
      survey.render(container);
    });
  </script>
</body>
</html>

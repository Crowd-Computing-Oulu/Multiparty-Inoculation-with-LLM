<!DOCTYPE html>
<html lang="en">
{% include 'includes/head.html' %}

<body class="d-flex flex-column min-vh-100">
  {% include 'includes/navbar.html' %}

  <div class="container mt-5" style="max-width: 900px;">
    <h2 class="mb-4 text-center">Welcome to MindFort</h2>
    <p class="text-center mb-4" style="font-size: 1.1rem;">
      Please review the information below and provide your consent to participate.
    </p>
    <div id="surveyContainer"></div>
  </div>

  {% include 'includes/footer.html' %}

  <!-- SurveyJS CDN -->
  <link href="https://unpkg.com/survey-core@2.5.17/survey-core.min.css" rel="stylesheet">
  <script src="https://unpkg.com/survey-core@2.5.17/survey.core.min.js"></script>
  <script src="https://unpkg.com/survey-js-ui@2.5.17/survey-js-ui.min.js"></script>
  <script src="https://unpkg.com/survey-core@2.5.17/themes/flat-light-panelless.min.js"></script>

  <!-- Survey definitions -->
  <script src="{{ url_for('static', filename='surveys/survey_definitions.js') }}"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const survey = new Survey.Model(window.consentSurvey);
      survey.applyTheme(SurveyTheme.FlatLightPanelless);

      survey.onComplete.add(function(sender) {
        // POST consent data then redirect
        const form = document.createElement("form");
        form.method = "POST";
        form.action = "{{ url_for('consent') }}";
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = "consent";
        input.value = "agreed";
        form.appendChild(input);
        document.body.appendChild(form);
        form.submit();
      });

      const container = document.getElementById("surveyContainer");
      survey.render(container);
    });
  </script>
</body>
</html>
